<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Engine Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(23, 23, 23, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(63, 63, 70, 0.3); }
        .btn-active { background-color: #2563eb !important; color: white !important; }
        input[type="checkbox"]:checked + div { background-color: #2563eb; border-color: #2563eb; }
        input[type="checkbox"]:checked + div i { display: block; }
    </style>
</head>
<body class="text-neutral-200 min-h-screen p-3 md:p-6">

    <div class="max-w-5xl mx-auto space-y-4">
        <header class="flex items-center justify-between py-2 border-b border-neutral-800">
            <div class="flex items-center gap-2">
                <i data-lucide="wand-2" class="w-6 h-6 text-blue-500"></i>
                <h1 class="text-xl font-bold tracking-tight">Grok Engine</h1>
            </div>
            <div id="install-badge" class="hidden text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded border border-blue-500/30 uppercase">App Pronto</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <main class="space-y-4 glass p-4 rounded-2xl">
                <div>
                    <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1 block">Ideia do Vídeo</label>
                    <textarea id="subject" placeholder="O que vai acontecer no vídeo?" 
                        class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none h-24 resize-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <label class="flex flex-col items-center justify-center h-20 border border-dashed border-neutral-700 rounded-xl cursor-pointer hover:bg-white/5">
                        <i data-lucide="image" class="w-5 h-5 text-neutral-500"></i>
                        <span class="text-[9px] mt-1 font-bold uppercase text-neutral-500">Imagem Ref.</span>
                        <input type="file" id="img-in" class="hidden" accept="image/*">
                    </label>
                    <label class="flex flex-col items-center justify-center h-20 border border-dashed border-neutral-700 rounded-xl cursor-pointer hover:bg-white/5">
                        <i data-lucide="film" class="w-5 h-5 text-neutral-500"></i>
                        <span class="text-[9px] mt-1 font-bold uppercase text-neutral-500">Vídeo (Fim)</span>
                        <input type="file" id="vid-in" class="hidden" accept="video/*">
                    </label>
                </div>

                <div id="pre-box" class="hidden bg-neutral-900 p-2 rounded-xl border border-neutral-800 flex items-center gap-3">
                    <img id="pre-img" class="h-12 w-12 object-cover rounded-lg border border-neutral-700">
                    <div class="flex-1 overflow-hidden">
                        <p id="pre-name" class="text-[10px] font-bold text-blue-400 truncate"></p>
                    </div>
                    <div class="flex gap-2">
                        <button id="pre-down" class="p-2 text-neutral-400 hover:text-white"><i data-lucide="download" class="w-4 h-4"></i></button>
                        <button id="pre-del" class="p-2 text-neutral-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="cam" class="bg-neutral-900 border border-neutral-800 rounded-lg p-2 text-xs outline-none">
                        <option value="">Câmera: Padrão</option>
                        <option value="Cinematográfica 4K">Cinematográfica</option>
                        <option value="Visão de Drone">Drone</option>
                        <option value="Câmera Lenta">Slow Motion</option>
                    </select>
                    <div class="flex bg-neutral-900 rounded-lg border border-neutral-800 p-1">
                        <button id="b6s" class="flex-1 py-1 text-[10px] font-bold rounded btn-active">6s</button>
                        <button id="b10s" class="flex-1 py-1 text-[10px] font-bold rounded text-neutral-500">10s</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <label class="flex items-center p-3 bg-neutral-900/50 rounded-xl cursor-pointer">
                        <input type="checkbox" id="ext" class="hidden">
                        <div class="w-4 h-4 border border-neutral-600 rounded mr-2 flex items-center justify-center transition-all"><i data-lucide="check" class="w-3 h-3 text-white hidden"></i></div>
                        <span class="text-[10px] font-bold text-neutral-400 uppercase">Extend</span>
                    </label>
                    <label class="flex items-center p-3 bg-neutral-900/50 rounded-xl cursor-pointer">
                        <input type="checkbox" id="zoom" class="hidden">
                        <div class="w-4 h-4 border border-neutral-600 rounded mr-2 flex items-center justify-center transition-all"><i data-lucide="check" class="w-3 h-3 text-white hidden"></i></div>
                        <span class="text-[10px] font-bold text-neutral-400 uppercase">Zoom Final</span>
                    </label>
                </div>
            </main>

            <aside class="flex flex-col space-y-3">
                <div class="flex-1 bg-neutral-900/50 border border-neutral-800 rounded-2xl p-5 flex flex-col">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">Prompt</span>
                        <span id="chars" class="text-[10px] font-mono text-neutral-600">0c</span>
                    </div>
                    <div id="out" class="flex-1 text-sm text-neutral-700 leading-relaxed font-mono overflow-y-auto break-words min-h-[150px]">Aguardando entrada...</div>
                    <button id="copy" disabled class="mt-4 w-full py-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-30 text-white rounded-xl font-bold text-xs flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="copy" class="w-4 h-4"></i> COPIAR COMANDO
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <canvas id="cv" class="hidden"></canvas>

    <script>
        const $ = (id) => document.getElementById(id);
        lucide.createIcons();

        let app = { sub: '', cam: '', time: '6', ext: false, zoom: false, img: null, isVid: false };

        const update = () => {
            if (!app.sub && !app.img) {
                $('out').innerText = "Aguardando entrada...";
                $('out').classList.add('text-neutral-700');
                $('copy').disabled = true;
                return;
            }
            $('out').classList.remove('text-neutral-700');
            $('copy').disabled = false;

            let p = [];
            if (app.img) p.push(app.isVid ? "[FRAME DE CONTINUIDADE]" : "[REF. IMAGEM]");
            if (app.sub) p.push(`Ação: ${app.sub}.`);
            if (app.cam) p.push(`Câmera: ${app.cam}.`);
            p.push(`Duração: ${app.time}s.`);
            if (app.ext) p.push("--extend");
            if (app.zoom) p.push("Finalizar com zoom facial.");

            const res = p.join(' ');
            $('out').innerText = res;
            $('chars').innerText = res.length + 'c';
        };

        $('subject').oninput = (e) => { app.sub = e.target.value; update(); };
        $('cam').onchange = (e) => { app.cam = e.target.value; update(); };
        $('b6s').onclick = () => { app.time = '6'; $('b6s').classList.add('btn-active'); $('b10s').classList.remove('btn-active'); update(); };
        $('b10s').onclick = () => { app.time = '10'; $('b10s').classList.add('btn-active'); $('b6s').classList.remove('btn-active'); update(); };
        $('ext').onchange = (e) => { app.ext = e.target.checked; update(); };
        $('zoom').onchange = (e) => { app.zoom = e.target.checked; update(); };

        const handleImg = (data, label, vid = false) => {
            app.img = data; app.isVid = vid;
            $('pre-box').classList.remove('hidden');
            $('pre-img').src = data;
            $('pre-name').innerText = label;
            update();
        };

        $('img-in').onchange = (e) => {
            const rd = new FileReader();
            rd.onload = (v) => handleImg(v.target.result, "Imagem");
            rd.readAsDataURL(e.target.files[0]);
        };

        // LÓGICA DE ÚLTIMO FRAME PRECISO
        $('vid-in').onchange = (e) => {
            const f = e.target.files[0];
            const v = document.createElement('video');
            v.preload = 'auto';
            v.muted = true;
            v.playsInline = true;
            v.src = URL.createObjectURL(f);
            
            v.onloadedmetadata = () => {
                // Vai exatamente para o último milissegundo disponível
                v.currentTime = v.duration;
            };

            v.onseeked = () => {
                const c = $('cv');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                handleImg(c.toDataURL('image/jpeg', 0.9), "Último Frame", true);
                URL.revokeObjectURL(v.src);
            };
        };

        $('pre-del').onclick = () => { app.img = null; $('pre-box').classList.add('hidden'); update(); };
        
        $('pre-down').onclick = () => {
            if (!app.img) return;
            const a = document.createElement('a');
            a.href = app.img;
            a.download = app.isVid ? "ultimo-frame.jpg" : "referencia.jpg";
            a.click();
        };

        $('copy').onclick = () => {
            navigator.clipboard.writeText($('out').innerText);
            $('copy').innerText = "COPIADO!";
            setTimeout(() => { $('copy').innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i> COPIAR COMANDO'; lucide.createIcons(); }, 2000);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
            window.addEventListener('beforeinstallprompt', (e) => { $('install-badge').classList.remove('hidden'); });
        }
    </script>
</body>
</html>
