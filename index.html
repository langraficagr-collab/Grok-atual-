<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Prompt Engine</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #171717; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .glass-panel { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
        .check-box.active { background-color: #2563eb; border-color: #2563eb; }
    </style>
</head>
<body class="text-neutral-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="flex items-center justify-between pb-6 border-b border-neutral-800">
            <div class="flex items-center space-x-3">
                <i data-lucide="wand-2" class="w-8 h-8 text-blue-500"></i>
                <h1 class="text-2xl font-bold tracking-tight text-white">Grok Prompt Engine</h1>
            </div>
            <span class="text-[10px] font-mono bg-blue-500/10 text-blue-500 border border-blue-500/20 px-2 py-1 rounded uppercase">v2.1 Stable</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <main class="space-y-6 glass-panel p-6 rounded-2xl shadow-2xl">
                
                <div class="space-y-2">
                    <label class="flex items-center space-x-2 text-xs font-bold text-neutral-500 uppercase tracking-widest">
                        <i data-lucide="video" class="w-4 h-4 text-blue-400"></i>
                        <span>Ideia do Vídeo</span>
                    </label>
                    <textarea id="subject" placeholder="Descreva o que deve acontecer no vídeo..." 
                        class="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all h-28 resize-none custom-scrollbar text-white"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="flex items-center space-x-2 text-xs font-bold text-neutral-500 uppercase tracking-widest">
                        <i data-lucide="camera" class="w-4 h-4 text-purple-400"></i>
                        <span>Anexar Referência</span>
                    </label>
                    
                    <div id="upload-zone" class="grid grid-cols-2 gap-3">
                        <label class="flex flex-col items-center justify-center h-24 border-2 border-dashed border-neutral-800 rounded-xl cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition-all group">
                            <i data-lucide="image-plus" class="w-6 h-6 text-neutral-500 group-hover:text-blue-400 mb-1"></i>
                            <span class="text-[10px] text-neutral-500 group-hover:text-blue-400 font-medium uppercase">Foto</span>
                            <input type="file" id="img-input" class="hidden" accept="image/*">
                        </label>
                        <label class="flex flex-col items-center justify-center h-24 border-2 border-dashed border-neutral-800 rounded-xl cursor-pointer hover:border-purple-500 hover:bg-purple-500/5 transition-all group">
                            <i data-lucide="film" class="w-6 h-6 text-neutral-500 group-hover:text-purple-400 mb-1"></i>
                            <span class="text-[10px] text-neutral-500 group-hover:text-purple-400 font-medium text-center leading-tight uppercase">Vídeo</span>
                            <input type="file" id="video-input" class="hidden" accept="video/*">
                        </label>
                    </div>

                    <div id="preview-container" class="hidden relative group mt-3 bg-neutral-950 p-2 rounded-xl border border-neutral-800 flex items-center gap-4">
                        <img id="ref-preview" class="h-16 w-16 object-cover rounded-lg border border-neutral-800 bg-black" src="">
                        <div class="flex-1 min-w-0">
                            <p id="ref-status" class="text-xs font-bold text-blue-400 truncate"></p>
                            <p class="text-[10px] text-neutral-500 font-medium">Referência processada</p>
                        </div>
                        <div class="flex gap-1">
                            <button id="download-ref" class="p-2 hover:bg-neutral-800 rounded-lg text-neutral-400 hover:text-white transition-colors">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </button>
                            <button id="remove-ref" class="p-2 hover:bg-red-900/30 rounded-lg text-neutral-400 hover:text-red-400">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-tighter">Câmera</label>
                        <select id="camera" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-2.5 text-xs text-white outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="">Padrão</option>
                            <option value="Cinematográfica 4K">Cinematográfica</option>
                            <option value="Visão de Drone">Drone</option>
                            <option value="Macro (Close-up)">Macro</option>
                            <option value="Câmera Lenta">Slow Motion</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-tighter">Áudio</label>
                        <select id="music" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-2.5 text-xs text-white outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="">Sem Som</option>
                            <option value="Épica / Orquestral">Épico</option>
                            <option value="Lo-Fi Relaxante">Lo-Fi</option>
                            <option value="Suspense Tenso">Suspense</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 border-t border-neutral-800 space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Duração</span>
                        <div class="flex bg-neutral-950 p-1 rounded-lg border border-neutral-800">
                            <button id="btn-6s" class="px-5 py-1.5 text-xs rounded-md transition-all font-bold">6s</button>
                            <button id="btn-10s" class="px-5 py-1.5 text-xs rounded-md transition-all font-bold">10s</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <label class="flex items-center p-3 bg-neutral-950 border border-neutral-800 rounded-xl cursor-pointer hover:border-blue-500 transition-all">
                            <input type="checkbox" id="extend" class="hidden">
                            <div class="check-box w-4 h-4 border-2 border-neutral-700 rounded mr-3 flex items-center justify-center">
                                <i data-lucide="check" class="w-3 h-3 text-white hidden"></i>
                            </div>
                            <span class="text-[11px] font-semibold text-neutral-300">Extender Vídeo</span>
                        </label>
                        <label class="flex items-center p-3 bg-neutral-950 border border-neutral-800 rounded-xl cursor-pointer hover:border-blue-500 transition-all">
                            <input type="checkbox" id="zoom-face" class="hidden">
                            <div class="check-box w-4 h-4 border-2 border-neutral-700 rounded mr-3 flex items-center justify-center">
                                <i data-lucide="check" class="w-3 h-3 text-white hidden"></i>
                            </div>
                            <span class="text-[11px] font-semibold text-neutral-300">Zoom Final</span>
                        </label>
                    </div>
                </div>
            </main>

            <aside class="flex flex-col h-full">
                <div class="flex-1 bg-neutral-900 border border-neutral-800 rounded-2xl p-6 shadow-2xl flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xs font-bold text-blue-400 flex items-center uppercase tracking-widest">
                            <i data-lucide="terminal" class="w-4 h-4 mr-2"></i> Prompt Grok
                        </h2>
                        <span id="char-count" class="text-[10px] text-neutral-600 font-mono">0 CHARS</span>
                    </div>

                    <div id="output" class="flex-1 bg-neutral-950 p-5 rounded-xl border border-neutral-800 text-neutral-700 text-sm leading-relaxed custom-scrollbar overflow-y-auto break-words min-h-[300px] font-mono">
                        Aguardando entrada...
                    </div>

                    <button id="copy-btn" class="mt-6 w-full py-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white rounded-xl font-bold flex items-center justify-center space-x-2 transition-all active:scale-95">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                        <span>Copiar Comando</span>
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <canvas id="proc-canvas" class="hidden"></canvas>

    <script>
        // Inicializa ícones
        lucide.createIcons();

        // Estado do App
        let state = {
            subject: '',
            camera: '',
            music: '',
            duration: '6',
            extend: false,
            zoomFace: false,
            imagePreview: null,
            isContinuity: false
        };

        // Elementos
        const els = {
            subject: document.getElementById('subject'),
            camera: document.getElementById('camera'),
            music: document.getElementById('music'),
            extend: document.getElementById('extend'),
            zoomFace: document.getElementById('zoom-face'),
            imgInput: document.getElementById('img-input'),
            videoInput: document.getElementById('video-input'),
            output: document.getElementById('output'),
            copyBtn: document.getElementById('copy-btn'),
            previewContainer: document.getElementById('preview-container'),
            refPreview: document.getElementById('ref-preview'),
            refStatus: document.getElementById('ref-status'),
            canvas: document.getElementById('proc-canvas'),
            charCount: document.getElementById('char-count'),
            btn6s: document.getElementById('btn-6s'),
            btn10s: document.getElementById('btn-10s')
        };

        // Funções de Interface
        function updateUI() {
            // Botões de tempo
            els.btn6s.className = state.duration === '6' ? 'px-5 py-1.5 text-xs rounded-md bg-blue-600 text-white font-bold' : 'px-5 py-1.5 text-xs rounded-md text-neutral-500 font-bold';
            els.btn10s.className = state.duration === '10' ? 'px-5 py-1.5 text-xs rounded-md bg-blue-600 text-white font-bold' : 'px-5 py-1.5 text-xs rounded-md text-neutral-500 font-bold';
            
            // Checkboxes
            [els.extend, els.zoomFace].forEach(el => {
                const box = el.parentElement.querySelector('.check-box');
                const icon = box.querySelector('i');
                if (el.checked) {
                    box.classList.add('active');
                    icon.classList.remove('hidden');
                } else {
                    box.classList.remove('active');
                    icon.classList.add('hidden');
                }
            });

            updatePrompt();
        }

        function updatePrompt() {
            if (!state.subject.trim() && !state.imagePreview) {
                els.output.innerText = "Aguardando entrada...";
                els.output.classList.add('text-neutral-700');
                els.copyBtn.disabled = true;
                els.charCount.innerText = "0 CHARS";
                return;
            }

            els.output.classList.remove('text-neutral-700');
            els.copyBtn.disabled = false;

            let prompt = [];
            if (state.imagePreview) prompt.push(state.isContinuity ? "[USAR ÚLTIMO FRAME DO VÍDEO]" : "[USAR IMAGEM COMO REFERÊNCIA]");
            if (state.subject.trim()) prompt.push(`Ação: ${state.subject.trim()}.`);
            if (state.camera) prompt.push(`Estilo: ${state.camera}.`);
            if (state.music) prompt.push(`Áudio: Trilha ${state.music.toLowerCase()}.`);
            prompt.push(`Duração: ${state.duration}s.`);
            if (state.extend) prompt.push("--extend");
            if (state.zoomFace) prompt.push("Finalizar com zoom focado no rosto.");

            const finalString = prompt.join(' ');
            els.output.innerText = finalString;
            els.charCount.innerText = `${finalString.length} CHARS`;
        }

        // Eventos
        els.subject.addEventListener('input', (e) => { state.subject = e.target.value; updatePrompt(); });
        els.camera.addEventListener('change', (e) => { state.camera = e.target.value; updatePrompt(); });
        els.music.addEventListener('change', (e) => { state.music = e.target.value; updatePrompt(); });
        
        els.btn6s.onclick = () => { state.duration = '6'; updateUI(); };
        els.btn10s.onclick = () => { state.duration = '10'; updateUI(); };

        [els.extend, els.zoomFace].forEach(el => {
            el.addEventListener('change', () => {
                state[el.id === 'zoom-face' ? 'zoomFace' : 'extend'] = el.checked;
                updateUI();
            });
        });

        // Upload de Imagem
        els.imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.imagePreview = ev.target.result;
                state.isContinuity = false;
                renderPreview("Imagem Carregada");
            };
            reader.readAsDataURL(file);
        });

        // Upload de Vídeo (Correção para GitHub e Celular)
        els.videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const video = document.createElement('video');
            video.preload = 'metadata';
            video.muted = true;
            video.playsInline = true;
            video.src = URL.createObjectURL(file);

            video.onloadedmetadata = () => {
                video.currentTime = Math.max(0, video.duration - 0.2);
            };

            video.onseeked = () => {
                const ctx = els.canvas.getContext('2d');
                els.canvas.width = video.videoWidth;
                els.canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                state.imagePreview = els.canvas.toDataURL('image/jpeg', 0.8);
                state.isContinuity = true;
                renderPreview("Frame Extraído");
                URL.revokeObjectURL(video.src);
            };
        });

        function renderPreview(label) {
            els.previewContainer.classList.remove('hidden');
            els.refPreview.src = state.imagePreview;
            els.refStatus.innerText = label;
            updatePrompt();
        }

        document.getElementById('remove-ref').onclick = () => {
            state.imagePreview = null;
            els.previewContainer.classList.add('hidden');
            els.imgInput.value = "";
            els.videoInput.value = "";
            updatePrompt();
        };

        els.copyBtn.onclick = () => {
            navigator.clipboard.writeText(els.output.innerText).then(() => {
                const originalText = els.copyBtn.innerHTML;
                els.copyBtn.innerHTML = "<span>Copiado!</span>";
                els.copyBtn.classList.replace('bg-blue-600', 'bg-green-600');
                setTimeout(() => {
                    els.copyBtn.innerHTML = originalText;
                    els.copyBtn.classList.replace('bg-green-600', 'bg-blue-600');
                    lucide.createIcons();
                }, 2000);
            });
        };

        document.getElementById('download-ref').onclick = () => {
            if (!state.imagePreview) return;
            const link = document.createElement('a');
            link.href = state.imagePreview;
            link.download = "referencia-grok.jpg";
            link.click();
        };

        // Inicia UI
        updateUI();

        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
    </html>
